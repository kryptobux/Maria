name: Deploy zu Strato

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-strato
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Dependencies
        run: npm ci

      - name: QA-Gates
        run: |
          npm run check:brand
          npm run check:typography

      - name: Static Export bauen
        env:
          NEXT_PUBLIC_SITE_URL: https://mariaschroeder.com
          GOOGLE_MAPS_EMBED_KEY: ${{ secrets.GOOGLE_MAPS_EMBED_KEY }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          N8N_TOKEN: ${{ secrets.N8N_TOKEN }}
        run: npm run build:static

      - name: Secrets prüfen
        run: |
          if [ -z "${{ secrets.STRATO_SSH_USER }}" ] || [ -z "${{ secrets.STRATO_SSH_PASSWORD }}" ]; then
            echo "::error::STRATO_SSH_USER / STRATO_SSH_PASSWORD fehlen (Repo → Settings → Secrets and variables → Actions)"
            exit 1
          fi

      # Strato erlaubt eigene Stammverzeichnisse nur für reine SFTP-Benutzer
      # (SSH = immer voller Webspace). Der Deploy-Benutzer ist deshalb Typ SFTP
      # mit Jail /mariaschroeder → Upload via lftp-mirror statt rsync; --delete
      # kann die anderen Domains auf dem Webspace nicht erreichen (s. DEPLOY.md).
      - name: Upload zu Strato (lftp mirror über SFTP)
        env:
          LFTP_PASSWORD: ${{ secrets.STRATO_SSH_PASSWORD }}
          STRATO_HOST: ${{ secrets.STRATO_SSH_HOST || '511850234.ssh.w1.strato.hosting' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          lftp -u "${{ secrets.STRATO_SSH_USER }},${LFTP_PASSWORD}" "sftp://${STRATO_HOST}" -e "
            set sftp:auto-confirm yes;
            set net:max-retries 2;
            mirror -R --delete --verbose out/ ./;
            bye"

      - name: Live-Check
        run: |
          sleep 5
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 https://mariaschroeder.com/ || true)
          echo "https://mariaschroeder.com/ → HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Seite antwortet nicht mit 200 — Domain-Zuordnung/SSL im Strato-Panel prüfen (DEPLOY.md Schritt 0)."
          fi
